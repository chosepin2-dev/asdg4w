<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투두리스트</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh;padding:16px}
.wrap{max-width:860px;margin:0 auto}

h1{text-align:center;font-size:1.6rem;background:linear-gradient(135deg,#a29bfe,#00cec9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.clock{text-align:center;color:#888;font-size:.82rem;margin-bottom:18px}

/* 통계 */
.stats{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:18px}
.st{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:10px;padding:8px 18px;text-align:center;min-width:80px}
.st b{display:block;font-size:1.3rem}
.st span{font-size:.7rem;color:#888}
.st.c1 b{color:#a29bfe}.st.c2 b{color:#00b894}.st.c3 b{color:#fdcb6e}.st.c4 b{color:#ff7675}

/* 추가 영역 */
.add-box{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:12px;padding:16px;margin-bottom:16px}
.add-box h2{font-size:.95rem;color:#a29bfe;margin-bottom:10px}
.row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.row input,.row select,.row textarea{padding:8px 10px;background:#16213e;border:1px solid #2a2a4a;border-radius:6px;color:#e0e0e0;font-size:.88rem;outline:none}
.row input:focus,.row select:focus,.row textarea:focus{border-color:#6c5ce7}
.row .grow{flex:1;min-width:160px}
.row textarea{width:100%;font-family:inherit;resize:vertical;min-height:38px}
.field-label{font-size:.72rem;color:#888;margin-bottom:2px;display:block}
.btn-add{padding:9px 28px;background:linear-gradient(135deg,#6c5ce7,#5041d0);border:none;border-radius:6px;color:#fff;font-weight:700;font-size:.92rem;cursor:pointer}
.btn-add:hover{opacity:.88}

/* 필터 */
.filter-toggle{width:100%;padding:9px;background:#1a1a2e;border:1px solid #2a2a4a;border-radius:10px;color:#888;cursor:pointer;font-size:.85rem;margin-bottom:4px;text-align:left}
.filter-toggle:hover{border-color:#6c5ce7;color:#e0e0e0}
.filter-panel{display:none;background:#1a1a2e;border:1px solid #2a2a4a;border-radius:0 0 10px 10px;padding:14px;margin-bottom:14px;margin-top:-5px}
.filter-panel.open{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:.72rem;color:#888}
.fg select,.fg input{padding:6px 8px;background:#16213e;border:1px solid #2a2a4a;border-radius:5px;color:#e0e0e0;font-size:.82rem;outline:none}
.fg select:focus,.fg input:focus{border-color:#6c5ce7}
.days{display:flex;gap:3px}
.dbtn{padding:4px 7px;border:1px solid #2a2a4a;background:#16213e;color:#888;border-radius:4px;cursor:pointer;font-size:.72rem;user-select:none}
.dbtn.on{background:#6c5ce7;border-color:#6c5ce7;color:#fff}
.btn-sm{padding:6px 12px;background:transparent;border:1px solid #2a2a4a;border-radius:5px;color:#888;cursor:pointer;font-size:.78rem}
.btn-sm:hover{border-color:#ff7675;color:#ff7675}

/* 검색/정렬 */
.toolbar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.toolbar input{flex:1;min-width:140px;padding:8px 10px;background:#1a1a2e;border:1px solid #2a2a4a;border-radius:8px;color:#e0e0e0;font-size:.85rem;outline:none}
.toolbar input:focus{border-color:#6c5ce7}
.toolbar select{padding:8px 10px;background:#1a1a2e;border:1px solid #2a2a4a;border-radius:8px;color:#e0e0e0;font-size:.82rem;outline:none}
.toolbar button{padding:8px 12px;background:#1a1a2e;border:1px solid #2a2a4a;border-radius:8px;color:#888;cursor:pointer;font-size:.78rem}
.toolbar button:hover{border-color:#6c5ce7;color:#e0e0e0}

/* 할일 목록 */
.list{display:flex;flex-direction:column;gap:8px}
.todo{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:10px;padding:12px;display:flex;align-items:flex-start;gap:10px;border-left:4px solid transparent;animation:fi .2s}
@keyframes fi{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.todo.p-high{border-left-color:#ff7675}
.todo.p-medium{border-left-color:#fdcb6e}
.todo.p-low{border-left-color:#00b894}
.todo.is-done{opacity:.4}
.todo.is-done .tt{text-decoration:line-through}
.todo.is-over{border-color:rgba(255,118,117,.35)}

.ck{width:20px;height:20px;border:2px solid #3a3a5a;border-radius:50%;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:transparent;margin-top:2px;transition:.15s}
.ck:hover{border-color:#00b894}
.ck.on{background:#00b894;border-color:#00b894;color:#fff}

.body{flex:1;min-width:0}
.tt{font-weight:600;word-break:break-word;margin-bottom:2px}
.td{font-size:.8rem;color:#888;word-break:break-word;margin-bottom:4px}
.meta{display:flex;gap:5px;flex-wrap:wrap}
.tg{font-size:.7rem;padding:2px 7px;border-radius:10px}
.tg-p{background:rgba(108,92,231,.18);color:#a29bfe}
.tg-c{background:rgba(0,184,148,.13);color:#00b894}
.tg-d{background:rgba(0,206,201,.13);color:#00cec9}
.tg-t{background:rgba(253,203,110,.13);color:#fdcb6e}
.tg-ov{background:rgba(255,118,117,.15);color:#ff7675}

.acts{display:flex;gap:4px;flex-shrink:0}
.acts button{width:26px;height:26px;border:1px solid #2a2a4a;background:#16213e;color:#888;border-radius:5px;cursor:pointer;font-size:.75rem;display:flex;align-items:center;justify-content:center}
.acts button:hover{border-color:#6c5ce7;color:#e0e0e0}
.acts .dl:hover{border-color:#ff7675;color:#ff7675}

/* 서브태스크 */
.subs{margin-top:5px}
.si{display:flex;align-items:center;gap:5px;padding:2px 0;font-size:.78rem;color:#999}
.sc{width:13px;height:13px;border:1.5px solid #3a3a5a;border-radius:3px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.55rem;color:transparent}
.sc.on{background:#00b894;border-color:#00b894;color:#fff}
.si.dn .sx{text-decoration:line-through;opacity:.5}
.sr{cursor:pointer;color:#ff7675;font-size:.68rem;margin-left:auto}
.sa{display:flex;gap:4px;margin-top:3px}
.sa input{flex:1;padding:3px 6px;background:#16213e;border:1px solid #2a2a4a;border-radius:4px;color:#e0e0e0;font-size:.75rem;outline:none}
.sa input:focus{border-color:#6c5ce7}
.sa button{padding:3px 7px;background:#6c5ce7;border:none;border-radius:4px;color:#fff;cursor:pointer;font-size:.75rem}
.pb{width:100%;height:3px;background:#2a2a4a;border-radius:2px;margin-top:5px}
.pf{height:100%;background:#00b894;border-radius:2px;transition:width .3s}

.empty{text-align:center;padding:40px 20px;color:#666}
.empty i{font-size:2rem;display:block;margin-bottom:8px}

/* 모달 */
.mo-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;justify-content:center;align-items:center;padding:20px}
.mo-bg.show{display:flex}
.mo{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:12px;padding:18px;max-width:420px;width:100%;max-height:80vh;overflow-y:auto}
.mo h3{color:#a29bfe;margin-bottom:10px;font-size:1rem}
.mf{margin-bottom:8px;display:flex;flex-direction:column;gap:3px}
.mf label{font-size:.72rem;color:#888}
.mf input,.mf select,.mf textarea{width:100%;padding:7px 9px;background:#16213e;border:1px solid #2a2a4a;border-radius:5px;color:#e0e0e0;font-size:.85rem;outline:none;font-family:inherit}
.mf textarea{resize:vertical;min-height:45px}
.mf input:focus,.mf select:focus,.mf textarea:focus{border-color:#6c5ce7}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.ma button{padding:8px 16px;border-radius:6px;cursor:pointer;font-size:.85rem;border:1px solid #2a2a4a}
.ms{background:#6c5ce7;color:#fff;border-color:#6c5ce7!important}
.mc{background:transparent;color:#888}

.toast{position:fixed;bottom:20px;right:20px;padding:10px 18px;background:#1a1a2e;border:1px solid #6c5ce7;border-radius:8px;color:#e0e0e0;font-size:.85rem;z-index:2000;animation:tin .25s,tout .25s 2.5s forwards}
@keyframes tin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes tout{from{opacity:1}to{opacity:0}}

@media(max-width:500px){.row{flex-direction:column}.row .grow{min-width:auto}}
</style>
</head>
<body>
<div class="wrap">
<h1>Smart To-Do</h1>
<div class="clock" id="clock"></div>

<div class="stats">
  <div class="st c1"><b id="s0">0</b><span>전체</span></div>
  <div class="st c2"><b id="s1">0</b><span>완료</span></div>
  <div class="st c3"><b id="s2">0</b><span>진행</span></div>
  <div class="st c4"><b id="s3">0</b><span>기한초과</span></div>
</div>

<!-- 추가 -->
<div class="add-box">
  <h2>+ 새 할 일</h2>
  <div class="row">
    <input class="grow" id="aTitle" placeholder="무엇을 해야 하나요?">
  </div>
  <div class="row">
    <textarea id="aDesc" rows="1" placeholder="메모 (선택)"></textarea>
  </div>
  <div class="row">
    <div class="fg"><label>날짜</label><input type="date" id="aDate"></div>
    <div class="fg"><label>시간</label><input type="time" id="aTime"></div>
    <div class="fg"><label>마감일</label><input type="date" id="aDue"></div>
    <div class="fg"><label>마감시간</label><input type="time" id="aDueT"></div>
  </div>
  <div class="row">
    <div class="fg"><label>우선순위</label><select id="aPri"><option value="high">🔴 높음</option><option value="medium" selected>🟡 보통</option><option value="low">🟢 낮음</option></select></div>
    <div class="fg"><label>카테고리</label><select id="aCat"><option>업무</option><option>개인</option><option>학습</option><option>건강</option><option>기타</option></select></div>
    <div style="flex:1"></div>
    <button class="btn-add" id="btnAdd">추가하기</button>
  </div>
</div>

<!-- 필터 -->
<button class="filter-toggle" id="fToggle">▶ 필터 열기 (연도 / 월 / 요일 / 시간 / 우선순위 / 카테고리 / 상태)</button>
<div class="filter-panel" id="fPanel">
  <div class="fg"><label>연도</label><select id="fYear"><option value="">전체</option></select></div>
  <div class="fg"><label>월</label><select id="fMonth"><option value="">전체</option><option value="0">1월</option><option value="1">2월</option><option value="2">3월</option><option value="3">4월</option><option value="4">5월</option><option value="5">6월</option><option value="6">7월</option><option value="7">8월</option><option value="8">9월</option><option value="9">10월</option><option value="10">11월</option><option value="11">12월</option></select></div>
  <div class="fg"><label>요일</label><div class="days" id="dayBtns"><div class="dbtn on" data-d="all">전체</div><div class="dbtn" data-d="0">일</div><div class="dbtn" data-d="1">월</div><div class="dbtn" data-d="2">화</div><div class="dbtn" data-d="3">수</div><div class="dbtn" data-d="4">목</div><div class="dbtn" data-d="5">금</div><div class="dbtn" data-d="6">토</div></div></div>
  <div class="fg"><label>시간 범위</label><div style="display:flex;gap:4px;align-items:center"><input type="time" id="fTS" style="width:95px"><span style="color:#888;font-size:.8rem">~</span><input type="time" id="fTE" style="width:95px"></div></div>
  <div class="fg"><label>우선순위</label><select id="fPri"><option value="">전체</option><option value="high">높음</option><option value="medium">보통</option><option value="low">낮음</option></select></div>
  <div class="fg"><label>카테고리</label><select id="fCat"><option value="">전체</option><option>업무</option><option>개인</option><option>학습</option><option>건강</option><option>기타</option></select></div>
  <div class="fg"><label>상태</label><select id="fSt"><option value="">전체</option><option value="pending">진행 중</option><option value="done">완료</option><option value="overdue">기한 초과</option></select></div>
  <button class="btn-sm" id="btnReset">초기화</button>
</div>

<!-- 검색/정렬 -->
<div class="toolbar">
  <input id="sQ" placeholder="🔍 검색...">
  <select id="sSort"><option value="new">최신순</option><option value="old">오래된순</option><option value="dateA">날짜 빠른순</option><option value="dateD">날짜 느린순</option><option value="priH">우선순위 높은순</option><option value="priL">우선순위 낮은순</option><option value="name">이름순</option></select>
  <button id="btnExp">📤 내보내기</button>
  <button id="btnImp">📥 가져오기</button>
  <input type="file" id="impFile" accept=".json" style="display:none">
  <button id="btnClr">🗑 완료 삭제</button>
</div>

<div class="list" id="list"></div>
</div>

<!-- 수정 모달 -->
<div class="mo-bg" id="moBg">
<div class="mo">
  <h3>수정하기</h3>
  <input type="hidden" id="eId">
  <div class="mf"><label>제목</label><input id="eTitle"></div>
  <div class="mf"><label>설명</label><textarea id="eDesc" rows="2"></textarea></div>
  <div class="mf"><label>날짜</label><input type="date" id="eDate"></div>
  <div class="mf"><label>시간</label><input type="time" id="eTime"></div>
  <div class="mf"><label>마감일</label><input type="date" id="eDue"></div>
  <div class="mf"><label>마감시간</label><input type="time" id="eDueT"></div>
  <div class="mf"><label>우선순위</label><select id="ePri"><option value="high">높음</option><option value="medium">보통</option><option value="low">낮음</option></select></div>
  <div class="mf"><label>카테고리</label><select id="eCat"><option>업무</option><option>개인</option><option>학습</option><option>건강</option><option>기타</option></select></div>
  <div class="ma"><button class="mc" id="btnMC">취소</button><button class="ms" id="btnMS">저장</button></div>
</div>
</div>

<script>
// ===== 데이터 =====
var todos = [];
try { todos = JSON.parse(localStorage.getItem('todos')) || []; } catch(e) { todos = []; }
var selDays = ['all'];
var DAY = ['일','월','화','수','목','금','토'];
var PRI_LABEL = {high:'🔴 높음', medium:'🟡 보통', low:'🟢 낮음'};
var PRI_VAL = {high:3, medium:2, low:1};

// ===== 유틸 =====
function g(id) { return document.getElementById(id); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2,5); }
function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function save() { localStorage.setItem('todos', JSON.stringify(todos)); }
function toast(msg) {
  var el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function() { if(el.parentNode) el.parentNode.removeChild(el); }, 3000);
}
function isOverdue(t) {
  if (t.done || !t.dueDate) return false;
  var now = new Date();
  var due = new Date(t.dueDate + (t.dueTime ? 'T' + t.dueTime : 'T23:59:59'));
  return now > due;
}
function fmtDate(ds) {
  if (!ds) return '';
  var d = new Date(ds + 'T00:00:00');
  return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0') + ' (' + DAY[d.getDay()] + ')';
}

// ===== 시계 =====
function tick() {
  var n = new Date();
  g('clock').textContent = n.getFullYear() + '년 ' + (n.getMonth()+1) + '월 ' + n.getDate() + '일 (' + DAY[n.getDay()] + ') ' + n.toLocaleTimeString('ko-KR');
}
tick();
setInterval(tick, 1000);

// ===== 오늘 날짜 기본값 =====
g('aDate').value = new Date().toISOString().split('T')[0];

// ===== 추가 =====
g('btnAdd').addEventListener('click', function() {
  var title = g('aTitle').value.trim();
  if (!title) {
    toast('제목을 입력해주세요!');
    g('aTitle').focus();
    return;
  }
  var todo = {
    id: uid(),
    title: title,
    desc: g('aDesc').value.trim(),
    date: g('aDate').value,
    time: g('aTime').value,
    dueDate: g('aDue').value,
    dueTime: g('aDueT').value,
    priority: g('aPri').value,
    category: g('aCat').value,
    done: false,
    subtasks: [],
    createdAt: new Date().toISOString()
  };
  todos.push(todo);
  save();
  // 입력 초기화
  g('aTitle').value = '';
  g('aDesc').value = '';
  g('aTime').value = '';
  g('aDue').value = '';
  g('aDueT').value = '';
  g('aTitle').focus();
  toast('할 일이 추가되었습니다!');
  render();
});

g('aTitle').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); g('btnAdd').click(); }
});

// ===== 필터 토글 =====
g('fToggle').addEventListener('click', function() {
  var p = g('fPanel');
  var open = p.classList.toggle('open');
  g('fToggle').textContent = (open ? '▼ 필터 닫기' : '▶ 필터 열기') + ' (연도 / 월 / 요일 / 시간 / 우선순위 / 카테고리 / 상태)';
});

// ===== 필터 변경 시 자동 렌더 =====
['fYear','fMonth','fTS','fTE','fPri','fCat','fSt'].forEach(function(id) {
  g(id).addEventListener('change', render);
});
g('sQ').addEventListener('input', render);
g('sSort').addEventListener('change', render);

// ===== 요일 버튼 =====
g('dayBtns').addEventListener('click', function(e) {
  var btn = e.target;
  if (!btn.classList.contains('dbtn')) return;
  var d = btn.getAttribute('data-d');
  if (d === 'all') {
    selDays = ['all'];
    var all = g('dayBtns').querySelectorAll('.dbtn');
    for (var i = 0; i < all.length; i++) all[i].classList.remove('on');
    btn.classList.add('on');
  } else {
    var allBtn = g('dayBtns').querySelector('[data-d="all"]');
    allBtn.classList.remove('on');
    selDays = selDays.filter(function(x) { return x !== 'all'; });
    btn.classList.toggle('on');
    if (btn.classList.contains('on')) {
      selDays.push(d);
    } else {
      selDays = selDays.filter(function(x) { return x !== d; });
    }
    if (selDays.length === 0) {
      selDays = ['all'];
      allBtn.classList.add('on');
    }
  }
  render();
});

// ===== 필터 초기화 =====
g('btnReset').addEventListener('click', function() {
  g('fYear').value = '';
  g('fMonth').value = '';
  g('fTS').value = '';
  g('fTE').value = '';
  g('fPri').value = '';
  g('fCat').value = '';
  g('fSt').value = '';
  g('sQ').value = '';
  selDays = ['all'];
  var all = g('dayBtns').querySelectorAll('.dbtn');
  for (var i = 0; i < all.length; i++) {
    all[i].classList.remove('on');
    if (all[i].getAttribute('data-d') === 'all') all[i].classList.add('on');
  }
  render();
});

// ===== 연도 옵션 갱신 =====
function updateYears() {
  var sel = g('fYear');
  var cur = sel.value;
  var yrs = {};
  yrs[new Date().getFullYear()] = true;
  todos.forEach(function(t) {
    if (t.date) yrs[new Date(t.date + 'T00:00:00').getFullYear()] = true;
  });
  var sorted = Object.keys(yrs).sort(function(a,b) { return b - a; });
  sel.innerHTML = '<option value="">전체</option>';
  sorted.forEach(function(y) {
    sel.innerHTML += '<option value="' + y + '">' + y + '년</option>';
  });
  sel.value = cur;
}

// ===== 필터 적용 =====
function getFiltered() {
  var list = todos.slice();
  var yr = g('fYear').value;
  var mo = g('fMonth').value;
  var ts = g('fTS').value;
  var te = g('fTE').value;
  var pri = g('fPri').value;
  var cat = g('fCat').value;
  var st = g('fSt').value;
  var q = g('sQ').value.toLowerCase().trim();

  if (yr) list = list.filter(function(t) { return t.date && new Date(t.date + 'T00:00:00').getFullYear() == yr; });
  if (mo !== '') list = list.filter(function(t) { return t.date && new Date(t.date + 'T00:00:00').getMonth() == parseInt(mo); });
  if (selDays.indexOf('all') === -1) {
    list = list.filter(function(t) {
      if (!t.date) return false;
      return selDays.indexOf(String(new Date(t.date + 'T00:00:00').getDay())) !== -1;
    });
  }
  if (ts) list = list.filter(function(t) { return !t.time || t.time >= ts; });
  if (te) list = list.filter(function(t) { return !t.time || t.time <= te; });
  if (pri) list = list.filter(function(t) { return t.priority === pri; });
  if (cat) list = list.filter(function(t) { return t.category === cat; });
  if (st === 'done') list = list.filter(function(t) { return t.done; });
  else if (st === 'pending') list = list.filter(function(t) { return !t.done; });
  else if (st === 'overdue') list = list.filter(function(t) { return isOverdue(t); });
  if (q) list = list.filter(function(t) {
    return t.title.toLowerCase().indexOf(q) !== -1 || (t.desc && t.desc.toLowerCase().indexOf(q) !== -1) || t.category.toLowerCase().indexOf(q) !== -1;
  });

  var sort = g('sSort').value;
  list.sort(function(a,b) {
    switch(sort) {
      case 'new': return new Date(b.createdAt) - new Date(a.createdAt);
      case 'old': return new Date(a.createdAt) - new Date(b.createdAt);
      case 'dateA': return (a.date||'9999').localeCompare(b.date||'9999');
      case 'dateD': return (b.date||'').localeCompare(a.date||'');
      case 'priH': return (PRI_VAL[b.priority]||0) - (PRI_VAL[a.priority]||0);
      case 'priL': return (PRI_VAL[a.priority]||0) - (PRI_VAL[b.priority]||0);
      case 'name': return a.title.localeCompare(b.title,'ko');
      default: return 0;
    }
  });
  return list;
}

// ===== 통계 =====
function updateStats() {
  var total = todos.length;
  var done = 0, over = 0;
  todos.forEach(function(t) {
    if (t.done) done++;
    if (isOverdue(t)) over++;
  });
  g('s0').textContent = total;
  g('s1').textContent = done;
  g('s2').textContent = total - done;
  g('s3').textContent = over;
}

// ===== 렌더 =====
function render() {
  updateYears();
  updateStats();
  var list = getFiltered();
  var el = g('list');

  if (list.length === 0) {
    el.innerHTML = '<div class="empty"><i>📭</i><p>표시할 할 일이 없습니다</p></div>';
    return;
  }

  var html = '';
  list.forEach(function(t) {
    var ov = isOverdue(t);
    var subs = t.subtasks || [];
    var subDone = 0;
    subs.forEach(function(s) { if(s.done) subDone++; });
    var pct = subs.length > 0 ? Math.round(subDone / subs.lengt * 00) : -1;
    var ds = fmtDate(t.date);
    var dueStr = '';
    if (t.dueDate) {
      dueStr = '마감: ' + fmtDate(t.dueDate);
      if (t.dueTime) dueStr += ' ' + t.dueTime;
    }

    html += '<div class="todo p-' + t.priority + (t.done ? ' is-done' : '') + (ov ? ' is-over' : '') + '">';
    html += '<div class="ck' + (t.done ? ' on' : '') + '" data-action="toggle" data-id="' + t.id + '">' + (t.done ? '✓' : '') + '</div>';
    html += '<div class="body">';
    html += '<div class="tt">' + esc(t.title) + '</div>';
    if (t.desc) html += '<div class="td">' + esc(t.desc) + '</div>';
    html += '<div class="meta">';
    html += '<span class="tg tg-p">' + PRI_LABEL[t.priority] + '</span>';
    html += '<span class="tg tg-c">' + esc(t.category) + '</span>';
    if (ds) html += '<span class="tg tg-d">📅 ' + ds + '</span>';
    if (t.time) html += '<span class="tg tg-t">⏰ ' + t.time + '</span>';
    if (dueStr) html += '<span class="tg ' + (ov ? 'tg-ov' : 'tg-d') + '">' + (ov ? '⚠️ ' : '🏁 ') + dueStr + '</span>';
    html += '</div>'; // meta

    // 서브태스크 진행바
    if (pct >= 0) {
      html += '<div class="pb"><div class="pf" style="width:' + pct + '%"></div></div>';
    }

    // 서브태스크 목록
    if (subs.length > 0) {
      html += '<div class="subs">';
      subs.forEach(function(s) {
        html += '<div class="si' + (s.done ? ' dn' : '') + '">';
        html += '<div class="sc' + (s.done ? ' on' : '') + '" data-action="togsub" data-tid="' + t.id + '" data-sid="' + s.id + '">' + (s.done ? '✓' : '') + '</div>';
        html += '<span class="sx">' + esc(s.text) + '</span>';
        html += '<span class="sr" data-action="delsub" data-tid="' + t.id + '" data-sid="' + s.id + '">✕</span>';
        html += '</div>';
      });
      html += '</div>';
    }

    // 서브태스크 추가
    html += '<div class="sa">';
    html += '<input placeholder="하위 작업 추가..." data-subinput="' + t.id + '">';
    html += '<button data-action="addsub" data-tid="' + t.id + '">+</button>';
    html += '</div>';

    html += '</div>'; // body

    // 액션 버튼
    html += '<div class="acts">';
    html += '<button data-action="edit" data-id="' + t.id + '" title="수정">✏️</button>';
    html += '<button data-action="dup" data-id="' + t.id + '" title="복제">📋</button>';
    html += '<button class="dl" data-action="del" data-id="' + t.id + '" title="삭제">🗑</button>';
    html += '</div>';

    html += '</div>'; // todo
  });

  el.innerHTML = html;
}

// ===== 이벤트 위임 (목록 클릭) =====
g('list').addEventListener('click', function(e) {
  var target = e.target;
  // data-action 가진 요소 찾기 (버블링)
  while (target && target !== this && !target.getAttribute('data-action')) {
    target = target.parentElement;
  }
  if (!target || !target.getAttribute('data-action')) return;

  var action = target.getAttribute('data-action');
  var id = target.getAttribute('data-id');
  var tid = target.getAttribute('data-tid');
  var sid = target.getAttribute('data-sid');

  if (action === 'toggle') {
    var t = findTodo(id);
    if (t) { t.done = !t.done; t.doneAt = t.done ? new Date().toISOString() : null; save(); render(); }
  }
  else if (action === 'del') {
    if (confirm('이 항목을 삭제할까요?')) {
      todos = todos.filter(function(x) { return x.id !== id; });
      save(); render(); toast('삭제되었습니다');
    }
  }
  else if (action === 'dup') {
    var orig = findTodo(id);
    if (orig) {
      var copy = JSON.parse(JSON.stringify(orig));
      copy.id = uid();
      copy.done = false;
      copy.doneAt = null;
      copy.createdAt = new Date().toISOString();
      if (copy.subtasks) copy.subtasks.forEach(function(s) { s.done = false; });
      todos.push(copy);
      save(); render(); toast('복제되었습니다');
    }
  }
  else if (action === 'edit') {
    openEdit(id);
  }
  else if (action === 'togsub') {
    var todo = findTodo(tid);
    if (todo && todo.subtasks) {
      var sub = todo.subtasks.filter(function(s) { return s.id === sid; })[0];
      if (sub) { sub.done = !sub.done; save(); render(); }
    }
  }
  else if (action === 'delsub') {
    var todo2 = findTodo(tid);
    if (todo2 && todo2.subtasks) {
      todo2.subtasks = todo2.subtasks.filter(function(s) { return s.id !== sid; });
      save(); render();
    }
  }
  else if (action === 'addsub') {
    var inp = document.querySelector('[data-subinput="' + tid + '"]');
    if (inp) {
      var val = inp.value.trim();
      if (!val) return;
      var todo3 = findTodo(tid);
      if (todo3) {
        if (!todo3.subtasks) todo3.subtasks = [];
        todo3.subtasks.push({ id: uid(), text: val, done: false });
        save(); render();
      }
    }
  }
});

// 서브태스크 input에서 Enter
g('list').addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  var inp = e.target;
  var tid = inp.getAttribute('data-subinput');
  if (!tid) return;
  e.preventDefault();
  var val = inp.value.trim();
  if (!val) return;
  var todo = findTodo(tid);
  if (todo) {
    if (!todo.subtasks) todo.subtasks = [];
    todo.subtasks.push({ id: uid(), text: val, done: false });
    save(); render();
  }
});

function findTodo(id) {
  for (var i = 0; i < todos.length; i++) {
    if (todos[i].id === id) return todos[i];
  }
  return null;
}

// ===== 수정 모달 =====
function openEdit(id) {
  var t = findTodo(id);
  if (!t) return;
  g('eId').value = id;
  g('eTitle').value = t.title;
  g('eDesc').value = t.desc || '';
  g('eDate').value = t.date || '';
  g('eTime').value = t.time || '';
  g('eDue').value = t.dueDate || '';
  g('eDueT').value = t.dueTime || '';
  g('ePri').value = t.priority;
  g('eCat').value = t.category;
  g('moBg').classList.add('show');
}

g('btnMC').addEventListener('click', function() { g('moBg').classList.remove('show'); });
g('moBg').addEventListener('click', function(e) { if (e.target === g('moBg')) g('moBg').classList.remove('show'); });

g('btnMS').addEventListener('click', function() {
  var id = g('eId').value;
  var t = findTodo(id);
  if (!t) return;
  var title = g('eTitle').value.trim();
  if (!title) { toast('제목을 입력해주세요!'); return; }
  t.title = title;
  t.desc = g('eDesc').value.trim();
  t.date = g('eDate').value;
  t.time = g('eTime').value;
  t.dueDate = g('eDue').value;
  t.dueTime = g('eDueT').value;
  t.priority = g('ePri').value;
  t.category = g('eCat').value;
  g('moBg').classList.remove('show');
  save(); render(); toast('수정되었습니다');
});

// ===== 내보내기 / 가져오기 =====
g('btnExp').addEventListener('click', function() {
  var blob = new Blob([JSON.stringify(todos, null, 2)], {type: 'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'todos_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('JSON으로 내보냈습니다');
});

g('btnImp').addEventListener('click', function() { g('impFile').click(); });
g('impFile').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var data = JSON.parse(ev.target.result);
      if (Array.isArray(data)) {
        todos = data;
        save(); render();
        toast(data.length + '개 항목을 가져왔습니다');
      } else {
        toast('올바른 형식이 아닙니다');
      }
    } catch(err) {
      toast('파일을 읽을 수 없습니다');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ===== 완료 삭제 =====
g('btnClr').addEventListener('click', function() {
  var cnt = todos.filter(function(t) { return t.done; }).length;
  if (cnt === 0) { toast('완료된 항목이 없습니다'); return; }
  if (confirm('완료된 ' + cnt + '개 항목을 삭제할까요?')) {
    todos = todos.filter(function(t) { return !t.done; });
    save(); render(); toast('완료 항목을 삭제했습니다');
  }
});

// ===== 초기 렌더 =====
render();
</script>
